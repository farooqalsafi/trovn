<!DOCTYPE html>
<html><head><title>Key Option 4 — Tech / Circuit</title>
<style>body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fff;font-family:system-ui}h2{color:#0F172A;margin-bottom:0}p{color:#475569;margin-bottom:32px}</style>
</head><body>
<h2>Option 4 — Tech / Circuit</h2>
<p>Key made of circuit board patterns with glowing LED traces</p>
<svg width="300" height="500" viewBox="0 0 300 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g4" x1="150" y1="0" x2="150" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="g4board" x1="0" y1="0" x2="300" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="ledGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#8B5CF6" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Bow — rounded rectangle (PCB shape) -->
  <rect x="65" y="15" width="170" height="170" rx="24" stroke="url(#g4board)" stroke-width="14" fill="#0F172A"/>

  <!-- Circuit traces on bow -->
  <g stroke="#6C3AED" stroke-width="2" opacity="0.6" filter="url(#ledGlow)">
    <!-- Horizontal traces -->
    <line x1="85" y1="50" x2="135" y2="50"/>
    <line x1="165" y1="50" x2="215" y2="50"/>
    <line x1="85" y1="80" x2="120" y2="80"/>
    <line x1="180" y1="80" x2="215" y2="80"/>
    <line x1="85" y1="120" x2="120" y2="120"/>
    <line x1="180" y1="120" x2="215" y2="120"/>
    <line x1="85" y1="150" x2="135" y2="150"/>
    <line x1="165" y1="150" x2="215" y2="150"/>

    <!-- Vertical traces -->
    <line x1="100" y1="50" x2="100" y2="80"/>
    <line x1="200" y1="50" x2="200" y2="80"/>
    <line x1="100" y1="120" x2="100" y2="150"/>
    <line x1="200" y1="120" x2="200" y2="150"/>

    <!-- Diagonal traces -->
    <line x1="135" y1="50" x2="150" y2="70"/>
    <line x1="165" y1="50" x2="150" y2="70"/>
    <line x1="135" y1="150" x2="150" y2="130"/>
    <line x1="165" y1="150" x2="150" y2="130"/>
  </g>

  <!-- LED nodes at trace intersections -->
  <g filter="url(#ledGlow)">
    <circle cx="85" cy="50" r="3" fill="#8B5CF6"/>
    <circle cx="215" cy="50" r="3" fill="#8B5CF6"/>
    <circle cx="85" cy="150" r="3" fill="#3B82F6"/>
    <circle cx="215" cy="150" r="3" fill="#3B82F6"/>
    <circle cx="100" cy="80" r="3" fill="#A78BFA"/>
    <circle cx="200" cy="80" r="3" fill="#A78BFA"/>
    <circle cx="100" cy="120" r="3" fill="#7C3AED"/>
    <circle cx="200" cy="120" r="3" fill="#7C3AED"/>
  </g>

  <!-- Center chip / processor -->
  <rect x="125" y="75" width="50" height="50" rx="4" fill="#1E1B4B" stroke="#6C3AED" stroke-width="2"/>
  <rect x="132" y="82" width="36" height="36" rx="2" fill="#0F172A" stroke="#8B5CF6" stroke-width="1"/>
  <!-- Chip pins -->
  <g stroke="#6C3AED" stroke-width="1.5">
    <line x1="135" y1="75" x2="135" y2="68"/>
    <line x1="150" y1="75" x2="150" y2="68"/>
    <line x1="165" y1="75" x2="165" y2="68"/>
    <line x1="135" y1="125" x2="135" y2="132"/>
    <line x1="150" y1="125" x2="150" y2="132"/>
    <line x1="165" y1="125" x2="165" y2="132"/>
    <line x1="125" y1="90" x2="118" y2="90"/>
    <line x1="125" y1="110" x2="118" y2="110"/>
    <line x1="175" y1="90" x2="182" y2="90"/>
    <line x1="175" y1="110" x2="182" y2="110"/>
  </g>
  <!-- Center glow -->
  <circle cx="150" cy="100" r="10" fill="#6C3AED" opacity="0.4" filter="url(#ledGlow)"/>
  <circle cx="150" cy="100" r="5" fill="#A78BFA"/>
  <circle cx="148" cy="97" r="2" fill="white" opacity="0.6"/>

  <!-- Shaft — dark PCB body -->
  <rect x="138" y="185" width="24" height="185" rx="3" fill="url(#g4board)"/>

  <!-- Circuit traces on shaft -->
  <g stroke="#6C3AED" stroke-width="1.5" opacity="0.7" filter="url(#ledGlow)">
    <line x1="143" y1="200" x2="143" y2="360"/>
    <line x1="157" y1="200" x2="157" y2="360"/>
    <line x1="143" y1="220" x2="157" y2="220"/>
    <line x1="143" y1="260" x2="157" y2="260"/>
    <line x1="143" y1="300" x2="157" y2="300"/>
    <line x1="143" y1="340" x2="157" y2="340"/>
  </g>

  <!-- Shaft LED nodes -->
  <g filter="url(#ledGlow)">
    <circle cx="143" cy="220" r="2.5" fill="#8B5CF6"/>
    <circle cx="157" cy="260" r="2.5" fill="#3B82F6"/>
    <circle cx="143" cy="300" r="2.5" fill="#A78BFA"/>
    <circle cx="157" cy="340" r="2.5" fill="#6C3AED"/>
  </g>

  <!-- Bit — angular circuit teeth -->
  <rect x="138" y="365" width="75" height="18" rx="3" fill="url(#g4board)"/>
  <line x1="142" y1="374" x2="210" y2="374" stroke="#6C3AED" stroke-width="1.5" opacity="0.5" filter="url(#ledGlow)"/>

  <!-- Teeth — PCB style -->
  <rect x="148" y="383" width="18" height="45" rx="2" fill="#0F172A" stroke="#6C3AED" stroke-width="1.5"/>
  <line x1="157" y1="388" x2="157" y2="423" stroke="#8B5CF6" stroke-width="1" opacity="0.6" filter="url(#ledGlow)"/>

  <rect x="172" y="383" width="18" height="30" rx="2" fill="#0F172A" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="181" y1="388" x2="181" y2="408" stroke="#3B82F6" stroke-width="1" opacity="0.6" filter="url(#ledGlow)"/>

  <rect x="196" y="383" width="18" height="16" rx="2" fill="#0F172A" stroke="#5B21B6" stroke-width="1.5"/>

  <!-- Tooth tip LEDs -->
  <circle cx="157" cy="425" r="2" fill="#8B5CF6" filter="url(#ledGlow)"/>
  <circle cx="181" cy="410" r="2" fill="#3B82F6" filter="url(#ledGlow)"/>
</svg>
</body></html>
