<!DOCTYPE html>
<html><head><title>Key Option 5 — Luxury Chrome</title>
<style>body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fff;font-family:system-ui}h2{color:#0F172A;margin-bottom:0}p{color:#475569;margin-bottom:32px}</style>
</head><body>
<h2>Option 5 — Luxury Chrome</h2>
<p>Premium sleek key with polished metallic finish and elegant proportions</p>
<svg width="300" height="500" viewBox="0 0 300 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g5" x1="110" y1="0" x2="190" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="25%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6C3AED"/>
      <stop offset="75%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="g5chrome" x1="130" y1="0" x2="170" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g5dark" x1="150" y1="0" x2="150" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B0764"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <filter id="chromeShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6C3AED" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g filter="url(#chromeShadow)">
    <!-- Bow — elegant oval/pill shape -->
    <ellipse cx="150" cy="95" rx="72" ry="82" stroke="url(#g5)" stroke-width="20" fill="none"/>
    <!-- Chrome highlight on bow -->
    <ellipse cx="150" cy="95" rx="72" ry="82" stroke="url(#g5chrome)" stroke-width="20" fill="none"/>

    <!-- Inner cutout shape — elegant teardrop -->
    <ellipse cx="150" cy="90" rx="38" ry="45" fill="white"/>
    <ellipse cx="150" cy="90" rx="38" ry="45" stroke="url(#g5)" stroke-width="4" fill="none"/>

    <!-- Subtle inner highlight -->
    <ellipse cx="145" cy="80" rx="20" ry="25" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>

    <!-- Top accent cap -->
    <ellipse cx="150" cy="13" rx="12" ry="6" fill="url(#g5)"/>
    <ellipse cx="150" cy="13" rx="12" ry="6" fill="url(#g5chrome)"/>

    <!-- Collar transition -->
    <rect x="128" y="172" width="44" height="20" rx="10" fill="url(#g5)"/>
    <rect x="128" y="172" width="22" height="20" rx="10" fill="url(#g5chrome)"/>

    <!-- Shaft — slim and elegant -->
    <rect x="139" y="188" width="22" height="185" rx="5" fill="url(#g5)"/>
    <rect x="139" y="188" width="11" height="185" rx="5" fill="url(#g5chrome)"/>

    <!-- Single elegant band -->
    <rect x="135" y="218" width="30" height="6" rx="3" fill="url(#g5dark)"/>
    <rect x="135" y="218" width="15" height="6" rx="3" fill="url(#g5chrome)" opacity="0.5"/>

    <!-- Subtle shaft lines -->
    <rect x="141" y="248" width="18" height="1.5" rx="1" fill="white" opacity="0.1"/>
    <rect x="141" y="278" width="18" height="1.5" rx="1" fill="white" opacity="0.08"/>
    <rect x="141" y="308" width="18" height="1.5" rx="1" fill="white" opacity="0.06"/>
    <rect x="141" y="338" width="18" height="1.5" rx="1" fill="white" opacity="0.05"/>

    <!-- Bit — clean and refined -->
    <rect x="139" y="368" width="65" height="14" rx="4" fill="url(#g5)"/>
    <rect x="139" y="368" width="33" height="14" rx="4" fill="url(#g5chrome)"/>

    <!-- Teeth — smooth rounded -->
    <rect x="149" y="382" width="14" height="42" rx="5" fill="url(#g5)"/>
    <rect x="149" y="382" width="7" height="42" rx="5" fill="url(#g5chrome)"/>

    <rect x="169" y="382" width="14" height="28" rx="5" fill="#5B21B6"/>
    <rect x="169" y="382" width="7" height="28" rx="5" fill="url(#g5chrome)"/>

    <rect x="189" y="382" width="14" height="16" rx="5" fill="#4C1D95"/>
    <rect x="189" y="382" width="7" height="16" rx="5" fill="url(#g5chrome)"/>
  </g>
</svg>
</body></html>
